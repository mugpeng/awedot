name: "Feature Request / 功能建议"
description: "Suggest an improvement or new feature / 功能建议"
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! 欢迎提出功能建议！

  - type: textarea
    id: problem
    attributes:
      label: "Problem or motivation / 问题或动机"
      description: "What problem does this solve? 这个功能解决什么问题？"
      placeholder: "I often find myself..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution / 建议方案"
      description: "How do you envision this working? / 你设想它怎么工作？"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives you've tried / 尝试过的替代方案"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Area / 功能领域"
      options:
        - Notch / UI
        - Sessions
        - Bookmarks
        - Resume
        - Settings
        - Other
    validations:
      required: true

  - type: checkboxes
    id: search
    attributes:
      label: "Checklist"
      options:
        - label: "I searched existing issues and this hasn't been requested yet / 我已搜索过，这个功能未被请求过"
          required: true
